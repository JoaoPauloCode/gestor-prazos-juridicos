<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Prazos</title>

  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/script.js" defer></script>
</head>

<body>
  <div class="container">

    <h1>Gestor de Prazos</h1>

    <div id="mensagem"></div>

    <h2>Cadastrar Processo</h2>

    <div class="form-linha">
      <input id="numero" placeholder="Número">
      <input id="nome" placeholder="Nome">
      <input type="date" id="data">
      <input id="dias" placeholder="Dias" type="number">
      <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <h2>Buscar Processo</h2>

    <div class="form-linha">
      <input id="buscarNumero" placeholder="Número">
      <button onclick="buscar()">Buscar</button>
    </div>

    <h2>Lista de Processos</h2>

    <button onclick="listar()">Atualizar Lista</button>

    <div id="lista"></div>

  </div>
</body>
</html>
