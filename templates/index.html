<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gestor de Prazos</title>

  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/script.js" defer></script>
</head>

<body>
  <div class="container">

    <h1>Gestor de Prazos</h1>

    <div id="mensagem"></div>

    <h2>Cadastrar Processo</h2>
      <p>Informe a data de início e o prazo em dias úteis (CPC).</p>

    <div class="form-linha">
      <input id="numero" placeholder="Número">
      <input id="nome" placeholder="Nome">

      <div>
        <label>Data de início</label>
        <input type="date" id="data">
      </div>

      <div>
        <label>Dias úteis</label>
        <input id="dias" type="number" placeholder="Ex: 10">
      </div>

      <button onclick="cadastrar()">Cadastrar</button>
    </div>

    <h2>Buscar Processo</h2>

    <div class="form-linha">
      <input id="buscarNumero" placeholder="Número">
      <button onclick="buscar()">Buscar</button>
    </div>

    <h2>Lista de Processos</h2>

    <button onclick="listar()">Atualizar Lista</button>

    <div id="lista"></div>

  </div>
</body>
</html>
